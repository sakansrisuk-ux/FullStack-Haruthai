<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer - My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <script> tailwind.config = { theme: { extend: { fontFamily: { display: ['Playfair Display', 'serif'], sans: ['DM Sans', 'sans-serif'] }, colors: { bg: '#0a0a0a', surface: '#141414', card: '#1a1a1a', border: '#2a2a2a', muted: '#6b6b6b', fg: '#e8e8e8', accent: '#c9a86c', success: '#4ade80', warning: '#fbbf24' } } } } </script>
  <style> body { font-family: 'DM Sans', sans-serif; background-color: #0a0a0a; color: #e8e8e8; } .sidebar-link { transition: all 0.2s ease; } .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(90deg, rgba(201, 168, 108, 0.1) 0%, transparent 100%); border-left-color: #c9a86c; color: #c9a86c; } .card-hover { transition: transform 0.3s ease; } .card-hover:hover { transform: translateY(-4px); } </style>
</head>
<body class="min-h-screen">
  <div class="fixed inset-0 bg-gradient-to-br from-bg via-surface to-bg pointer-events-none"></div>
  <div class="relative flex min-h-screen">
    <aside class="fixed left-0 top-0 h-full w-64 bg-surface/80 backdrop-blur-xl border-r border-border z-40 flex flex-col">
      <div class="p-6 border-b border-border"><h1 class="font-display text-2xl text-accent">Savoria</h1><p class="text-xs text-muted mt-1">Customer Portal</p></div>
      <nav class="p-4 space-y-1 flex-1">
        <a href="customer_orders.html" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-lg border-l-2 border-transparent text-left"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><span>My Orders</span></a>
        <a href="customer_payments.html" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg border-l-2 border-transparent text-left text-muted hover:text-fg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg><span>My Payments</span></a>
      </nav>
    </aside>
    
    <main class="flex-1 ml-64 p-8">
      <div class="max-w-6xl mx-auto">
        <div class="mb-8"><h2 class="font-display text-3xl mb-2">My Orders</h2><p class="text-muted">Track your food status</p></div>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="grid"><p class="text-muted col-span-3 text-center py-10">Loading...</p></div>
      </div>
    </main>
  </div>
<!-- แก้ไข APIURL/APIKEYตรงนี้ -->
  <script>
    const SUPABASE_URL = 'https://ikwmynxboutmiabgieia.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlrd215bnhib3V0bWlhYmdpZWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTY3MTMsImV4cCI6MjA4OTU3MjcxM30.btAIgAISuaiABbShyBdoVhbrlc4Moy5omXghJocXhrI';
    if(SUPABASE_URL.includes('YOUR_')) alert('Customer: Please set Supabase Keys!');
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- กำหนดชื่อลูกค้าตรงนี้ (จำลองการล็อกอิน) ---
    const MY_NAME = 'Somchai Prasert'; 

    const colorMap = { 'pending': 'bg-warning/20 text-warning', 'preparing': 'bg-accent/20 text-accent', 'completed': 'bg-success/20 text-success' };

    async function fetchMyOrders() {
      const { data, error } = await supabaseClient.from('orders').select('*').eq('customer_name', MY_NAME).order('created_at', { ascending: false });
      if(error) return console.error(error);
      render(data);
    }

    function render(data) {
      document.getElementById('grid').innerHTML = data.length ? data.map(o => `
        <div class="bg-card/60 border border-border rounded-2xl p-5 card-hover">
          <div class="flex justify-between mb-2">
            <span class="font-display text-lg">${o.order_time}</span>
            <span class="px-2 py-1 rounded-full text-xs ${colorMap[o.status] || 'bg-muted/20'}">${o.status}</span>
          </div>
          <p class="text-sm text-muted mb-1">${o.table_number}</p>
          <p class="text-sm my-2">${o.items.join(', ')}</p>
          <div class="flex justify-between items-center pt-3 border-t border-border">
            <span class="font-display text-accent">฿${o.total.toLocaleString()}</span>
          </div>
        </div>
      `).join('') : `<p class="text-muted col-span-3 text-center py-10">You have no orders yet.</p>`;
    }

    fetchMyOrders();
  </script>
</body>
</html>
